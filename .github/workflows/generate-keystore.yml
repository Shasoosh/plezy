name: Generate Persistent Keystore (run once)

# Run this workflow manually ONCE to create your permanent signing key.
# Copy the printed base64 value and save it as a repository secret named
# KEYSTORE_BASE64. Then delete or disable this workflow.
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore plezy-release.jks \
            -alias key \
            -keyalg RSA -keysize 4096 -validity 36500 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Shasoosh, O=Shasoosh, C=US"

      - name: Print base64-encoded keystore
        run: |
          echo "====== KEYSTORE_BASE64 — copy everything between the lines ======"
          base64 -w 0 plezy-release.jks
          echo ""
          echo "=================================================================="
          echo "Save the above as a repository secret named: KEYSTORE_BASE64"
          echo "Also set: KEYSTORE_PASSWORD and KEY_PASSWORD as secrets (already used above)"
