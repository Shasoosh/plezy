name: Fix dart format (run once)

# One-shot workflow: runs dart format on lib/ and commits any changes to main.
# Trigger manually once, then delete the workflow file (or leave it harmless).

on:
  workflow_dispatch:

jobs:
  fix-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get --no-example

      - name: Run dart format
        run: dart format lib/

      - name: Commit formatted files (if any changed)
        run: |
          git config user.name "Shasoosh"
          git config user.email "shasoosh@gmail.com"
          git diff --quiet && echo "Nothing to format" && exit 0
          git add lib/
          git commit -m "style: fix dart format violations"
          git push
